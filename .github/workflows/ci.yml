name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  OMNE_FOUNDATION_REF: dd7802611a4365f61d9bc5abbda5752b6e0382bb
  OMNE_RUNTIME_REF: 3376d2cf84058dadf6537a290924f1d1f4e954e1

jobs:
  node-packages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ditto-llm
        uses: actions/checkout@v4
        with:
          path: ditto-llm

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2
          run_install: false

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: ditto-llm/pnpm-lock.yaml

      - name: pnpm install (packages only)
        working-directory: ditto-llm
        run: CI=true pnpm install --frozen-lockfile --filter './packages/**'

      - name: pnpm typecheck (packages only)
        working-directory: ditto-llm
        run: pnpm run typecheck

      - name: pnpm build (packages only)
        working-directory: ditto-llm
        run: pnpm run build

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ditto-llm
        uses: actions/checkout@v4
        with:
          path: ditto-llm

      - name: Install mdBook
        uses: taiki-e/install-action@mdbook

      - name: docs system check
        working-directory: ditto-llm
        run: ./scripts/check-docs-system.sh

      - name: mdbook build docs
        working-directory: ditto-llm
        run: mdbook build docs

  gateway-contract-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ditto-llm
        uses: actions/checkout@v4
        with:
          path: ditto-llm
          fetch-depth: 0

      - name: Checkout omne_foundation
        uses: actions/checkout@v4
        with:
          repository: omne42/omne_foundation
          ref: ${{ env.OMNE_FOUNDATION_REF }}
          path: omne_foundation

      - name: Checkout omne-runtime
        uses: actions/checkout@v4
        with:
          repository: omne42/omne-runtime
          ref: ${{ env.OMNE_RUNTIME_REF }}
          path: omne-runtime

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ditto-llm -> target

      - name: Resolve base contract
        id: base_contract
        working-directory: ditto-llm
        run: |
          set -euo pipefail
          BASE_OUT="${RUNNER_TEMP}/gateway-contract-base.openapi.yaml"
          HAS_BASE=0
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.base_ref }}"
            git fetch --no-tags --prune --depth=1 origin "${BASE_REF}"
            if git cat-file -e "origin/${BASE_REF}:contracts/gateway-contract-v0.1.openapi.yaml"; then
              git show "origin/${BASE_REF}:contracts/gateway-contract-v0.1.openapi.yaml" > "${BASE_OUT}"
              HAS_BASE=1
            fi
          else
            if git rev-parse --verify HEAD^ >/dev/null 2>&1 && git cat-file -e "HEAD^:contracts/gateway-contract-v0.1.openapi.yaml"; then
              git show "HEAD^:contracts/gateway-contract-v0.1.openapi.yaml" > "${BASE_OUT}"
              HAS_BASE=1
            fi
          fi
          echo "has_base=${HAS_BASE}" >> "${GITHUB_OUTPUT}"
          echo "base_path=${BASE_OUT}" >> "${GITHUB_OUTPUT}"

      - name: Contract guard (diff + semver gate)
        if: steps.base_contract.outputs.has_base == '1'
        working-directory: ditto-llm
        run: |
          cargo run -p ditto-core --features contract-guard --bin ditto-gateway-contract-guard -- \
            --base "${{ steps.base_contract.outputs.base_path }}" \
            --head ./contracts/gateway-contract-v0.1.openapi.yaml \
            --contract-lib ./crates/ditto-gateway-contract-types/src/lib.rs \
            --contract-cargo ./crates/ditto-gateway-contract-types/Cargo.toml

      - name: Contract guard (bootstrap mode)
        if: steps.base_contract.outputs.has_base != '1'
        working-directory: ditto-llm
        run: |
          cargo run -p ditto-core --features contract-guard --bin ditto-gateway-contract-guard -- \
            --head ./contracts/gateway-contract-v0.1.openapi.yaml \
            --contract-lib ./crates/ditto-gateway-contract-types/src/lib.rs \
            --contract-cargo ./crates/ditto-gateway-contract-types/Cargo.toml \
            --allow-missing-base

  rust-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ditto-llm
        uses: actions/checkout@v4
        with:
          path: ditto-llm

      - name: Checkout omne_foundation
        uses: actions/checkout@v4
        with:
          repository: omne42/omne_foundation
          ref: ${{ env.OMNE_FOUNDATION_REF }}
          path: omne_foundation

      - name: Checkout omne-runtime
        uses: actions/checkout@v4
        with:
          repository: omne42/omne-runtime
          ref: ${{ env.OMNE_RUNTIME_REF }}
          path: omne-runtime

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: cargo audit
        working-directory: ditto-llm
        run: cargo audit

  rust-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ditto-llm
        uses: actions/checkout@v4
        with:
          path: ditto-llm

      - name: Checkout omne_foundation
        uses: actions/checkout@v4
        with:
          repository: omne42/omne_foundation
          ref: ${{ env.OMNE_FOUNDATION_REF }}
          path: omne_foundation

      - name: Checkout omne-runtime
        uses: actions/checkout@v4
        with:
          repository: omne42/omne-runtime
          ref: ${{ env.OMNE_RUNTIME_REF }}
          path: omne-runtime

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0
          components: llvm-tools-preview

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ditto-llm -> target

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate ditto-core contract coverage baseline
        working-directory: ditto-llm
        run: |
          mkdir -p coverage
          cargo llvm-cov clean --workspace
          cargo llvm-cov -p ditto-core \
            --test default_core_contract \
            --test catalog_resolver_contract \
            --test runtime_explain_contract \
            --test runtime_registry_contract \
            --test runtime_route_contract \
            --test runtime_transport_contract \
            --test transport_policy_contract \
            --no-report
          cargo llvm-cov report --lcov --output-path coverage/ditto-core.lcov
          cargo llvm-cov report --summary-only | tee coverage/ditto-core-summary.txt
          cat coverage/ditto-core-summary.txt >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: |
            ditto-llm/coverage/ditto-core.lcov
            ditto-llm/coverage/ditto-core-summary.txt

  rust:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ditto
          POSTGRES_PASSWORD: ditto
          POSTGRES_DB: ditto
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ditto -d ditto"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: ditto
          MYSQL_USER: ditto
          MYSQL_PASSWORD: ditto
          MYSQL_ROOT_PASSWORD: ditto
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pditto"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DITTO_POSTGRES_URL: postgresql://ditto:ditto@127.0.0.1:5432/ditto
      DITTO_MYSQL_URL: mysql://ditto:ditto@127.0.0.1:3306/ditto
      DITTO_REDIS_URL: redis://127.0.0.1:6379
    steps:
      - name: Checkout ditto-llm
        uses: actions/checkout@v4
        with:
          path: ditto-llm

      - name: Checkout omne_foundation
        uses: actions/checkout@v4
        with:
          repository: omne42/omne_foundation
          ref: ${{ env.OMNE_FOUNDATION_REF }}
          path: omne_foundation

      - name: Checkout omne-runtime
        uses: actions/checkout@v4
        with:
          repository: omne42/omne-runtime
          ref: ${{ env.OMNE_RUNTIME_REF }}
          path: omne-runtime

      - name: Checkout safe-fs-tools
        uses: actions/checkout@v4
        with:
          repository: omne42/safe-fs-tools
          ref: 7bfdfe429ebfec1b529ed26bf8f486e3ba62b51e
          path: safe-fs-tools

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ditto-llm -> target

      - name: cargo fmt
        working-directory: ditto-llm
        run: cargo fmt --all -- --check

      - name: llms.txt up to date
        working-directory: ditto-llm
        run: cargo run -p ditto-core --bin ditto-llms-txt -- --check

      - name: gateway contract types check
        working-directory: ditto-llm
        run: cargo test --manifest-path crates/ditto-gateway-contract-types/Cargo.toml

      - name: cargo test (ditto-core lib)
        working-directory: ditto-llm
        run: cargo test -p ditto-core --lib

      - name: cargo test (ditto-core agent integration)
        working-directory: ditto-llm
        run: cargo test -p ditto-core --features agent --test agent_loop --test agent_toolbox

      - name: cargo test (ditto-server targets compile)
        working-directory: ditto-llm
        run: cargo test -p ditto-server --all-targets --no-run

      - name: cargo check (default examples)
        working-directory: ditto-llm
        run: cargo check -p ditto-core --examples

      - name: cargo clippy (ditto-core all features)
        working-directory: ditto-llm
        run: cargo clippy -p ditto-core --lib --all-features -- -D warnings

      - name: cargo clippy (ditto-server all features)
        working-directory: ditto-llm
        run: cargo clippy -p ditto-server --lib --all-features -- -D warnings

      - name: cargo test (ditto-core all features)
        working-directory: ditto-llm
        run: cargo test -p ditto-core --lib --all-features

      - name: cargo test (ditto-server all targets compile)
        working-directory: ditto-llm
        run: cargo test -p ditto-server --all-targets --no-run --all-features

      - name: cargo test (gateway resilience slice)
        working-directory: ditto-llm
        run: |
          cargo test -p ditto-server --features "gateway gateway-routing-advanced" --test gateway_openai_proxy max_in_flight
          cargo test -p ditto-server --features "gateway gateway-routing-advanced" --test gateway_openai_proxy health_check_skips_unhealthy_backends
          cargo test -p ditto-server --features "gateway gateway-routing-advanced" --test gateway_openai_proxy circuit_breaker
          cargo test -p ditto-server --features "gateway gateway-routing-advanced" --test gateway_openai_proxy timeout

      - name: cargo check (ditto-core no default features)
        working-directory: ditto-llm
        run: cargo check -p ditto-core --no-default-features

      - name: cargo check (ditto-server no default features)
        working-directory: ditto-llm
        run: cargo check -p ditto-server --no-default-features

      - name: cargo check (provider feature matrix)
        working-directory: ditto-llm
        shell: bash
        run: |
          set -euo pipefail
          while IFS='|' read -r label features; do
            echo "::group::${label}"
            cargo check -p ditto-core --lib --no-default-features --features "${features}" -q
            echo "::endgroup::"
          done <<'EOF'
          provider-openai|provider-openai
          provider-openai+cap-llm|provider-openai,cap-llm
          provider-openai-compatible|provider-openai-compatible
          provider-openai-compatible+cap-llm|provider-openai-compatible,cap-llm
          EOF

      - name: cargo check (legacy feature alias smoke)
        working-directory: ditto-llm
        shell: bash
        run: |
          set -euo pipefail
          while IFS='|' read -r label features; do
            echo "::group::${label}"
            cargo check -p ditto-core --lib --no-default-features --features "${features}" -q
            echo "::endgroup::"
          done <<'EOF'
          openai|openai
          openai-compatible+streaming|openai-compatible,streaming
          anthropic+cap-llm|anthropic,cap-llm
          openai-compatible+embeddings|openai-compatible,embeddings
          EOF

      - name: cargo check (ditto-core agent slice)
        working-directory: ditto-llm
        run: cargo check -p ditto-core --features agent

      - name: cargo check (ditto-server gateway translation slice)
        working-directory: ditto-llm
        run: cargo check -p ditto-server --lib --no-default-features --features "gateway gateway-translation provider-openai-compatible cap-llm"

      - name: cargo clippy (no default features + provider-openai)
        working-directory: ditto-llm
        run: cargo clippy -p ditto-core --no-default-features --features provider-openai --all-targets -- -D warnings

      - name: cargo clippy (no default features + provider-openai-compatible)
        working-directory: ditto-llm
        run: cargo clippy -p ditto-core --no-default-features --features provider-openai-compatible --all-targets -- -D warnings

      - name: cargo clippy (no default features + provider-anthropic)
        working-directory: ditto-llm
        run: cargo clippy -p ditto-core --no-default-features --features provider-anthropic --all-targets -- -D warnings

      - name: cargo clippy (no default features + provider-google)
        working-directory: ditto-llm
        run: cargo clippy -p ditto-core --no-default-features --features provider-google --all-targets -- -D warnings

      - name: cargo clippy (no default features + provider-cohere)
        working-directory: ditto-llm
        run: cargo clippy -p ditto-core --no-default-features --features provider-cohere --all-targets -- -D warnings

      - name: cargo clippy (no default features + provider-bedrock)
        working-directory: ditto-llm
        run: cargo clippy -p ditto-core --no-default-features --features provider-bedrock --all-targets -- -D warnings

      - name: cargo clippy (no default features + provider-vertex)
        working-directory: ditto-llm
        run: cargo clippy -p ditto-core --no-default-features --features provider-vertex --all-targets -- -D warnings

  gateway-store-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        store: [sqlite, postgres, mysql]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ditto
          POSTGRES_PASSWORD: ditto
          POSTGRES_DB: ditto
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ditto -d ditto"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: ditto
          MYSQL_USER: ditto
          MYSQL_PASSWORD: ditto
          MYSQL_ROOT_PASSWORD: ditto
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pditto"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
    env:
      DITTO_POSTGRES_URL: postgresql://ditto:ditto@127.0.0.1:5432/ditto
      DITTO_MYSQL_URL: mysql://ditto:ditto@127.0.0.1:3306/ditto
    steps:
      - name: Checkout ditto-llm
        uses: actions/checkout@v4
        with:
          path: ditto-llm

      - name: Checkout omne_foundation
        uses: actions/checkout@v4
        with:
          repository: omne42/omne_foundation
          ref: ${{ env.OMNE_FOUNDATION_REF }}
          path: omne_foundation

      - name: Checkout omne-runtime
        uses: actions/checkout@v4
        with:
          repository: omne42/omne-runtime
          ref: ${{ env.OMNE_RUNTIME_REF }}
          path: omne-runtime

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ditto-llm -> target

      - name: Create CI gateway config
        working-directory: ditto-llm
        run: |
          cat > gateway.ci.json <<'JSON'
          {
            "backends": [],
            "virtual_keys": [],
            "router": {
              "default_backends": [],
              "rules": []
            }
          }
          JSON

      - name: Run sqlite store tests
        if: matrix.store == 'sqlite'
        working-directory: ditto-llm
        run: |
          cargo test -p ditto-server --features "gateway gateway-store-sqlite" sqlite_store_round_trips_virtual_keys
          cargo run -p ditto-server --features "gateway gateway-store-sqlite" --bin ditto-gateway -- ./gateway.ci.json --sqlite ./gateway.ci.sqlite --db-doctor

      - name: Run postgres store tests
        if: matrix.store == 'postgres'
        working-directory: ditto-llm
        run: |
          cargo test -p ditto-server --features "gateway gateway-store-postgres" postgres_store_round_trips_config_audit_and_ledgers
          cargo run -p ditto-server --features "gateway gateway-store-postgres" --bin ditto-gateway -- ./gateway.ci.json --pg "${DITTO_POSTGRES_URL}" --db-doctor

      - name: Run mysql store tests
        if: matrix.store == 'mysql'
        working-directory: ditto-llm
        run: |
          cargo test -p ditto-server --features "gateway gateway-store-mysql" mysql_store_round_trips_config_audit_and_ledgers
          cargo run -p ditto-server --features "gateway gateway-store-mysql" --bin ditto-gateway -- ./gateway.ci.json --mysql "${DITTO_MYSQL_URL}" --db-doctor

  gateway-store-bench:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ditto
          POSTGRES_PASSWORD: ditto
          POSTGRES_DB: ditto
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ditto -d ditto"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: ditto
          MYSQL_USER: ditto
          MYSQL_PASSWORD: ditto
          MYSQL_ROOT_PASSWORD: ditto
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -pditto"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
    env:
      DITTO_POSTGRES_URL: postgresql://ditto:ditto@127.0.0.1:5432/ditto
      DITTO_MYSQL_URL: mysql://ditto:ditto@127.0.0.1:3306/ditto
    steps:
      - name: Checkout ditto-llm
        uses: actions/checkout@v4
        with:
          path: ditto-llm

      - name: Checkout omne_foundation
        uses: actions/checkout@v4
        with:
          repository: omne42/omne_foundation
          ref: ${{ env.OMNE_FOUNDATION_REF }}
          path: omne_foundation

      - name: Checkout omne-runtime
        uses: actions/checkout@v4
        with:
          repository: omne42/omne-runtime
          ref: ${{ env.OMNE_RUNTIME_REF }}
          path: omne-runtime

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ditto-llm -> target

      - name: Run store benchmark matrix
        working-directory: ditto-llm
        run: |
          cargo run -p ditto-server --features "gateway gateway-store-sqlite gateway-store-postgres gateway-store-mysql" --bin ditto-store-bench -- \
            --sqlite ./target/ci-store-bench.sqlite \
            --pg "${DITTO_POSTGRES_URL}" \
            --mysql "${DITTO_MYSQL_URL}" \
            --audit-ops 2500 \
            --reap-ops 1200 \
            --out ./target/store-bench.json
          cat ./target/store-bench.json

      - name: Upload store benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: gateway-store-bench
          path: ditto-llm/target/store-bench.json
          if-no-files-found: error
