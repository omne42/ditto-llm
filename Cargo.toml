[package]
name = "ditto-llm"
version = "1.0.0"
edition = "2024"
rust-version = "1.85"

[features]
default = ["provider-openai-compatible", "cap-llm"]

# Modules
agent = ["dep:regex", "dep:safe-fs-tools"]
auth = ["dep:hmac", "dep:sha2", "dep:time"]
config-editing = ["dep:toml_edit"]
config-interactive = ["config-editing"]
sdk = []
sdk-axum = ["sdk", "dep:axum"]
gateway = ["dep:axum", "dep:getrandom", "dep:regex", "dep:sha2", "config-editing"]
gateway-cli-interactive = ["gateway", "config-interactive"]
gateway-config-yaml = ["gateway", "dep:serde_yaml"]
gateway-devtools = ["gateway", "sdk"]
gateway-translation = ["gateway"]
gateway-proxy-cache = ["gateway"]
gateway-routing-advanced = ["gateway"]
gateway-metrics-prometheus = ["gateway"]
gateway-costing = ["gateway"]
gateway-tokenizer = ["gateway", "dep:tiktoken-rs"]
gateway-store-sqlite = ["gateway", "dep:rusqlite"]
gateway-store-redis = ["gateway", "dep:redis"]
gateway-store-postgres = ["gateway", "dep:sqlx", "sqlx/postgres"]
gateway-store-mysql = ["gateway", "dep:sqlx", "sqlx/mysql"]
gateway-otel = [
  "gateway",
  "dep:tracing",
  "dep:tracing-subscriber",
  "dep:opentelemetry",
  "dep:opentelemetry_sdk",
  "dep:opentelemetry-otlp",
  "dep:tracing-opentelemetry",
]
base64 = ["dep:base64"]

# Internal protocol/provider implementation toggles retained for cfg compatibility.
openai = []
anthropic = []
google = []
openai-compatible = []
cohere = []
bedrock = ["auth", "base64"]
vertex = ["auth"]

# Public provider packs.
provider-openai-compatible = ["openai-compatible"]
provider-openai = ["openai"]
provider-anthropic = ["anthropic"]
provider-google = ["google"]
provider-cohere = ["cohere"]
provider-bedrock = ["bedrock"]
provider-vertex = ["vertex"]
provider-bailian = []
provider-deepseek = ["provider-openai-compatible"]
provider-doubao = []
provider-hunyuan = []
provider-kimi = ["provider-openai-compatible"]
provider-minimax = []
provider-openrouter = ["provider-openai-compatible"]
provider-qianfan = []
provider-xai = ["provider-openai-compatible"]
provider-zhipu = []

# Internal capability toggles retained for cfg compatibility.
streaming = []
tools = []
embeddings = []
images = []
videos = ["dep:base64"]
audio = []
moderations = []
rerank = []
batches = []
realtime = []

# Public capability packs.
cap-llm = ["streaming", "tools"]
cap-embedding = ["embeddings"]
cap-image-generation = ["images"]
cap-image-edit = ["images"]
cap-audio-transcription = ["audio"]
cap-audio-speech = ["audio"]
cap-moderation = ["moderations"]
cap-rerank = ["rerank"]
cap-batch = ["batches"]
cap-realtime = ["realtime"]

# Bundles.
all-providers = ["provider-openai-compatible", "provider-openai", "provider-anthropic", "provider-google", "provider-cohere", "provider-bedrock", "provider-vertex", "provider-bailian", "provider-deepseek", "provider-doubao", "provider-hunyuan", "provider-kimi", "provider-minimax", "provider-openrouter", "provider-qianfan", "provider-xai", "provider-zhipu"]
all-capabilities = ["cap-llm", "cap-embedding", "cap-image-generation", "cap-image-edit", "cap-audio-transcription", "cap-audio-speech", "cap-moderation", "cap-rerank", "cap-batch", "cap-realtime"]
all = ["all-providers", "all-capabilities"]

integration = []

[dependencies]
async-trait = "0.1"
axum = { version = "0.7", optional = true, features = ["json"] }
base64 = { version = "0.22", optional = true }
bytes = "1"
clap = { version = "4", features = ["derive"] }
futures-util = "0.3"
getrandom = { version = "0.4", optional = true }
hmac = { version = "0.12", optional = true }
reqwest = { version = "0.12", default-features = false, features = ["json", "multipart", "rustls-tls", "stream"] }
safe-fs-tools = { path = "../safe-fs-tools", optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = { version = "0.9", optional = true }
sha2 = { version = "0.10", optional = true }
thiserror = "1"
toml = "0.8"
time = { version = "0.3", features = ["formatting", "macros"], optional = true }
tokio = { version = "1", features = ["fs", "io-util", "macros", "process", "rt", "rt-multi-thread", "net", "sync", "time"] }
tokio-util = { version = "0.7", features = ["io"] }
toml_edit = { version = "0.22", optional = true }
rusqlite = { version = "0.32", optional = true, features = ["bundled"] }
redis = { version = "0.32", optional = true, features = ["tokio-comp", "safe_iterators"] }
sqlx = { version = "0.8", optional = true, default-features = false, features = ["runtime-tokio-rustls"] }
regex = { version = "1", optional = true }
opentelemetry = { version = "0.31", optional = true, default-features = false, features = ["trace"] }
opentelemetry_sdk = { version = "0.31", optional = true, default-features = false, features = ["rt-tokio", "trace"] }
opentelemetry-otlp = { version = "0.31", optional = true, default-features = false, features = ["http-proto", "reqwest-rustls", "trace"] }
tracing = { version = "0.1", optional = true, features = ["attributes"] }
tracing-subscriber = { version = "0.3", optional = true, features = ["env-filter", "json"] }
tracing-opentelemetry = { version = "0.32", optional = true }
tiktoken-rs = { version = "0.9.1", optional = true }

[dev-dependencies]
ditto-gateway-contract-types = { path = "crates/ditto-gateway-contract-types" }
httpmock = "0.8.2"
tempfile = "3"
tower = { version = "0.5", features = ["util"] }

[[example]]
name = "anthropic_messages"
required-features = ["provider-anthropic", "cap-llm"]

[[example]]
name = "batches"
required-features = ["provider-openai-compatible", "cap-batch"]

[[example]]
name = "cache_bench_deepseek_direct"
required-features = ["provider-openai-compatible", "cap-llm"]

[[example]]
name = "basic"
required-features = ["provider-openai-compatible", "cap-llm"]

[[example]]
name = "embeddings"
required-features = ["provider-openai", "cap-embedding"]

[[example]]
name = "local_native_formats"
required-features = ["provider-anthropic", "cap-llm"]

[[example]]
name = "multimodal"
required-features = ["provider-openai", "cap-llm", "base64"]

[[example]]
name = "openai_compatible"
required-features = ["provider-openai-compatible", "cap-llm"]

[[example]]
name = "openai_compatible_embeddings"
required-features = ["provider-openai-compatible", "cap-embedding"]

[[example]]
name = "streaming"
required-features = ["provider-openai-compatible", "cap-llm"]

[[example]]
name = "tool_calling"
required-features = ["provider-openai-compatible", "cap-llm"]
